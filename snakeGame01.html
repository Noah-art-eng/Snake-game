<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Game | 贪吃蛇作品</title>
  <style>
    :root {
      --bg: linear-gradient(135deg, #f5f7fa 0%, #e4ecfb 100%);
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --accent: #10b981;
      --danger: #ef4444;
      --border: #dbe4f0;
      --canvas-bg: #f8fafc;
      --snake: #2563eb;
      --snake-head: #1d4ed8;
      --food: #ef4444;
      --shadow: 0 12px 30px rgba(15, 23, 42, 0.12);
    }

    body[data-theme="dark"] {
      --bg: linear-gradient(135deg, #111827 0%, #0b1220 100%);
      --card: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --primary: #60a5fa;
      --primary-hover: #3b82f6;
      --accent: #34d399;
      --danger: #f87171;
      --border: #374151;
      --canvas-bg: #0f172a;
      --snake: #60a5fa;
      --snake-head: #93c5fd;
      --food: #fb7185;
      --shadow: 0 14px 36px rgba(0, 0, 0, 0.45);
    }

    body[data-theme="forest"] {
      --bg: linear-gradient(135deg, #eefbf3 0%, #dcf7e8 100%);
      --card: #ffffff;
      --text: #14532d;
      --muted: #4d7c57;
      --primary: #16a34a;
      --primary-hover: #15803d;
      --accent: #059669;
      --danger: #dc2626;
      --border: #bbf7d0;
      --canvas-bg: #f0fdf4;
      --snake: #16a34a;
      --snake-head: #15803d;
      --food: #dc2626;
      --shadow: 0 12px 30px rgba(22, 101, 52, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      transition: background 0.35s ease, color 0.35s ease;
      padding: 20px;
    }

    .app {
      width: min(920px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 22px;
      transition: all 0.3s ease;
    }

    .header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.4rem, 2.3vw, 2rem);
      line-height: 1.2;
    }

    .subtitle {
      margin-top: 6px;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .panel-grid {
      display: grid;
      grid-template-columns: 1fr 270px;
      gap: 16px;
    }

    .board-wrap {
      background: color-mix(in srgb, var(--card), #ffffff 6%);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
    }

    canvas {
      width: 100%;
      max-width: 560px;
      aspect-ratio: 1 / 1;
      display: block;
      margin: 0 auto;
      border-radius: 12px;
      border: 2px solid var(--border);
      background: var(--canvas-bg);
    }

    .overlay-tip {
      margin: 10px 4px 0;
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
    }

    .side {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      background: color-mix(in srgb, var(--card), #ffffff 5%);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 8px;
    }

    .stat {
      border: 1px dashed var(--border);
      border-radius: 10px;
      padding: 8px;
      text-align: center;
    }

    .stat .label {
      color: var(--muted);
      font-size: 0.82rem;
      margin-bottom: 3px;
    }

    .stat .value {
      font-weight: 700;
      font-size: 1.1rem;
    }

    .status {
      font-weight: 700;
      text-align: center;
      border-radius: 10px;
      padding: 10px;
      color: #fff;
      transition: background-color 0.25s ease;
    }

    .status.ready { background: #6b7280; }
    .status.playing { background: var(--accent); }
    .status.paused { background: #f59e0b; }
    .status.over { background: var(--danger); }

    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button, select {
      border: 1px solid var(--border);
      background: #fff;
      color: #111827;
      border-radius: 10px;
      padding: 9px 12px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    body[data-theme="dark"] button,
    body[data-theme="dark"] select {
      background: #1f2937;
      color: #e5e7eb;
      border-color: #4b5563;
    }

    button:hover, select:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(37, 99, 235, 0.2);
    }

    button.primary {
      background: var(--primary);
      color: #fff;
      border-color: transparent;
    }

    button.primary:hover { background: var(--primary-hover); }

    .small {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.45;
    }

    .footer-note {
      margin-top: 14px;
      text-align: center;
      color: var(--muted);
      font-size: 0.84rem;
    }

    @media (max-width: 860px) {
      .panel-grid { grid-template-columns: 1fr; }
      canvas { max-width: 100%; }
    }
  </style>
</head>
<body data-theme="light">
  <main class="app">
    <section class="header">
      <div>
        <h1 id="title"></h1>
        <div class="subtitle" id="subtitle"></div>
      </div>
      <div class="toolbar">
        <button id="langBtn" title="Switch Language"></button>
        <select id="themeSelect"></select>
      </div>
    </section>

    <section class="panel-grid">
      <div class="board-wrap">
        <canvas id="gameCanvas" width="560" height="560" aria-label="Snake Game Canvas"></canvas>
        <div class="overlay-tip" id="mobileTip"></div>
      </div>

      <aside class="side">
        <div class="card">
          <div id="statusLabel" class="small" style="margin-bottom:8px;"></div>
          <div id="statusBadge" class="status ready"></div>
        </div>

        <div class="card">
          <div class="stats">
            <div class="stat">
              <div class="label" id="scoreLabel"></div>
              <div class="value" id="scoreValue">0</div>
            </div>
            <div class="stat">
              <div class="label" id="bestLabel"></div>
              <div class="value" id="bestValue">0</div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="small" id="difficultyLabel" style="margin-bottom:8px;"></div>
          <select id="difficultySelect"></select>
          <div class="small" id="speedHint" style="margin-top:8px;"></div>
        </div>

        <div class="card">
          <div class="row">
            <button id="startBtn" class="primary"></button>
            <button id="pauseBtn"></button>
            <button id="restartBtn"></button>
          </div>
        </div>

        <div class="card">
          <div class="small" id="instructionsTitle" style="font-weight:700; margin-bottom:6px;"></div>
          <div class="small" id="instructionsContent"></div>
        </div>
      </aside>
    </section>

    <div class="footer-note" id="footerNote"></div>
  </main>

  <script>
    // ===============================
    // i18n 字典：所有可见文案统一管理
    // ===============================
    const i18n = {
      zh: {
        title: "贪吃蛇 Snake Game",
        subtitle: "原生 HTML + CSS + JavaScript 作品级实现",
        langButton: "English",
        themeLight: "主题：浅色",
        themeDark: "主题：深色",
        themeForest: "主题：森林",
        statusLabel: "当前状态",
        ready: "Ready（待开始）",
        playing: "Playing（进行中）",
        paused: "Paused（已暂停）",
        over: "Game Over（游戏结束）",
        score: "当前分数",
        best: "历史最高",
        difficulty: "难度 / 速度",
        speedHint: "速度越高，挑战越大。",
        easy: "简单（慢速）",
        normal: "普通（中速）",
        hard: "困难（快速）",
        start: "开始",
        pause: "暂停",
        resume: "继续",
        restart: "重新开始",
        instructionsTitle: "开始前说明",
        instructionsContent:
          "方向键或 WASD 控制移动。不能反向转头；撞墙或撞到自己将结束游戏。可随时暂停/继续。",
        mobileTip: "移动端建议连接键盘体验，或使用桌面浏览器。",
        footer: "作品展示版 | 支持中英文、主题切换、难度选择、最高分记录",
        gameOverAlert: "游戏结束！你的分数：",
        pauseTip: "已暂停，点击“继续”或按空格继续。"
      },
      en: {
        title: "Snake Game",
        subtitle: "Portfolio-grade implementation with Vanilla HTML/CSS/JavaScript",
        langButton: "中文",
        themeLight: "Theme: Light",
        themeDark: "Theme: Dark",
        themeForest: "Theme: Forest",
        statusLabel: "Game Status",
        ready: "Ready",
        playing: "Playing",
        paused: "Paused",
        over: "Game Over",
        score: "Score",
        best: "Best",
        difficulty: "Difficulty / Speed",
        speedHint: "Higher speed means higher challenge.",
        easy: "Easy (Slow)",
        normal: "Normal (Medium)",
        hard: "Hard (Fast)",
        start: "Start",
        pause: "Pause",
        resume: "Resume",
        restart: "Restart",
        instructionsTitle: "Before You Start",
        instructionsContent:
          "Use Arrow Keys or WASD to control. Reversing is blocked; hit wall or self ends the game. Pause/resume anytime.",
        mobileTip: "For mobile, keyboard is recommended. Desktop browser is preferred.",
        footer: "Portfolio Edition | i18n, themes, difficulty options, high-score storage",
        gameOverAlert: "Game Over! Your score: ",
        pauseTip: "Paused. Click Resume or press Space to continue."
      }
    };

    // 根据当前语言获取文案
    function t(key) {
      return i18n[state.language][key] ?? key;
    }

    // ===============================
    // 游戏配置与状态
    // ===============================
    const STORAGE_KEYS = {
      bestScore: "snake_best_score_v1",
      language: "snake_lang_v1",
      theme: "snake_theme_v1",
      difficulty: "snake_difficulty_v1"
    };

    const SPEED_MAP = {
      easy: 170,
      normal: 120,
      hard: 85
    };

    const GRID_SIZE = 20;      // 20x20 网格
    const CELL_SIZE = 28;      // 每格像素
    const BOARD_PX = GRID_SIZE * CELL_SIZE;

    const state = {
      language: localStorage.getItem(STORAGE_KEYS.language) || "zh",
      theme: localStorage.getItem(STORAGE_KEYS.theme) || "light",
      difficulty: localStorage.getItem(STORAGE_KEYS.difficulty) || "normal",
      gameStatus: "ready",     // ready | playing | paused | over
      score: 0,
      bestScore: 0,
      snake: [],
      direction: { x: 1, y: 0 },
      nextDirection: { x: 1, y: 0 },
      food: { x: 10, y: 10 },
      loopId: null
    };

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // ===============================
    // DOM 引用
    // ===============================
    const dom = {
      title: document.getElementById("title"),
      subtitle: document.getElementById("subtitle"),
      langBtn: document.getElementById("langBtn"),
      themeSelect: document.getElementById("themeSelect"),
      statusLabel: document.getElementById("statusLabel"),
      statusBadge: document.getElementById("statusBadge"),
      scoreLabel: document.getElementById("scoreLabel"),
      bestLabel: document.getElementById("bestLabel"),
      scoreValue: document.getElementById("scoreValue"),
      bestValue: document.getElementById("bestValue"),
      difficultyLabel: document.getElementById("difficultyLabel"),
      difficultySelect: document.getElementById("difficultySelect"),
      speedHint: document.getElementById("speedHint"),
      startBtn: document.getElementById("startBtn"),
      pauseBtn: document.getElementById("pauseBtn"),
      restartBtn: document.getElementById("restartBtn"),
      instructionsTitle: document.getElementById("instructionsTitle"),
      instructionsContent: document.getElementById("instructionsContent"),
      mobileTip: document.getElementById("mobileTip"),
      footerNote: document.getElementById("footerNote")
    };

    function safeLoadBestScore() {
      // localStorage 安全读取：异常时回退默认值
      try {
        const val = Number(localStorage.getItem(STORAGE_KEYS.bestScore) || 0);
        return Number.isFinite(val) && val >= 0 ? val : 0;
      } catch {
        return 0;
      }
    }

    function safeSave(key, value) {
      // localStorage 安全写入：避免隐私模式等异常导致报错
      try {
        localStorage.setItem(key, value);
      } catch (err) {
        console.warn("localStorage write failed:", err);
      }
    }

    // ===============================
    // 初始化 UI
    // ===============================
    function initSelectors() {
      dom.themeSelect.innerHTML = `
        <option value="light">${t("themeLight")}</option>
        <option value="dark">${t("themeDark")}</option>
        <option value="forest">${t("themeForest")}</option>
      `;
      dom.themeSelect.value = state.theme;

      dom.difficultySelect.innerHTML = `
        <option value="easy">${t("easy")}</option>
        <option value="normal">${t("normal")}</option>
        <option value="hard">${t("hard")}</option>
      `;
      dom.difficultySelect.value = state.difficulty;
    }

    function getStatusText() {
      if (state.gameStatus === "ready") return t("ready");
      if (state.gameStatus === "playing") return t("playing");
      if (state.gameStatus === "paused") return t("paused");
      return t("over");
    }

    function updateStatusBadge() {
      dom.statusBadge.textContent = getStatusText();
      dom.statusBadge.className = "status " + (
        state.gameStatus === "ready" ? "ready" :
        state.gameStatus === "playing" ? "playing" :
        state.gameStatus === "paused" ? "paused" : "over"
      );
    }

    function renderTexts() {
      dom.title.textContent = t("title");
      dom.subtitle.textContent = t("subtitle");
      dom.langBtn.textContent = t("langButton");
      dom.statusLabel.textContent = t("statusLabel");
      dom.scoreLabel.textContent = t("score");
      dom.bestLabel.textContent = t("best");
      dom.difficultyLabel.textContent = t("difficulty");
      dom.speedHint.textContent = t("speedHint");
      dom.startBtn.textContent = t("start");
      dom.pauseBtn.textContent = state.gameStatus === "paused" ? t("resume") : t("pause");
      dom.restartBtn.textContent = t("restart");
      dom.instructionsTitle.textContent = t("instructionsTitle");
      dom.instructionsContent.textContent = t("instructionsContent");
      dom.mobileTip.textContent = t("mobileTip");
      dom.footerNote.textContent = t("footer");
      updateStatusBadge();
      initSelectors();
    }

    function updateScoreView() {
      dom.scoreValue.textContent = String(state.score);
      dom.bestValue.textContent = String(state.bestScore);
    }

    // ===============================
    // 核心游戏逻辑
    // ===============================
    function resetGameData() {
      state.snake = [
        { x: 8, y: 10 },
        { x: 7, y: 10 },
        { x: 6, y: 10 }
      ];
      state.direction = { x: 1, y: 0 };
      state.nextDirection = { x: 1, y: 0 };
      state.score = 0;
      spawnFood();
      updateScoreView();
    }

    function spawnFood() {
      // 随机生成食物，确保不会落在蛇身上
      let x, y, onSnake;
      do {
        x = Math.floor(Math.random() * GRID_SIZE);
        y = Math.floor(Math.random() * GRID_SIZE);
        onSnake = state.snake.some(seg => seg.x === x && seg.y === y);
      } while (onSnake);
      state.food = { x, y };
    }

    function isOppositeDirection(newDir) {
      return state.direction.x + newDir.x === 0 && state.direction.y + newDir.y === 0;
    }

    function setDirectionByKey(key) {
      const map = {
        ArrowUp: { x: 0, y: -1 },
        ArrowDown: { x: 0, y: 1 },
        ArrowLeft: { x: -1, y: 0 },
        ArrowRight: { x: 1, y: 0 },
        w: { x: 0, y: -1 },
        s: { x: 0, y: 1 },
        a: { x: -1, y: 0 },
        d: { x: 1, y: 0 }
      };
      const dir = map[key];
      if (!dir) return;
      if (!isOppositeDirection(dir)) state.nextDirection = dir;
    }

    function stepGame() {
      if (state.gameStatus !== "playing") return;

      state.direction = state.nextDirection;
      const head = state.snake[0];
      const newHead = { x: head.x + state.direction.x, y: head.y + state.direction.y };

      // 撞墙检测
      if (newHead.x < 0 || newHead.y < 0 || newHead.x >= GRID_SIZE || newHead.y >= GRID_SIZE) {
        endGame();
        return;
      }

      // 撞到自己检测
      if (state.snake.some(seg => seg.x === newHead.x && seg.y === newHead.y)) {
        endGame();
        return;
      }

      state.snake.unshift(newHead);

      // 吃到食物：加分并生成新食物；否则正常移动
      if (newHead.x === state.food.x && newHead.y === state.food.y) {
        state.score += 10;
        if (state.score > state.bestScore) {
          state.bestScore = state.score;
          safeSave(STORAGE_KEYS.bestScore, String(state.bestScore));
        }
        spawnFood();
      } else {
        state.snake.pop();
      }

      updateScoreView();
      draw();
    }

    function startLoop() {
      stopLoop();
      const speed = SPEED_MAP[state.difficulty];
      state.loopId = setInterval(stepGame, speed);
    }

    function stopLoop() {
      if (state.loopId) {
        clearInterval(state.loopId);
        state.loopId = null;
      }
    }

    function startGame() {
      if (state.gameStatus === "playing") return;
      if (state.gameStatus === "over" || state.gameStatus === "ready") {
        resetGameData();
      }
      state.gameStatus = "playing";
      updateStatusBadge();
      renderTexts();
      startLoop();
      draw();
    }

    function togglePause() {
      if (state.gameStatus === "ready" || state.gameStatus === "over") return;
      if (state.gameStatus === "playing") {
        state.gameStatus = "paused";
        stopLoop();
      } else if (state.gameStatus === "paused") {
        state.gameStatus = "playing";
        startLoop();
      }
      updateStatusBadge();
      renderTexts();
    }

    function restartGame() {
      stopLoop();
      resetGameData();
      state.gameStatus = "ready";
      updateStatusBadge();
      renderTexts();
      draw();
    }

    function endGame() {
      stopLoop();
      state.gameStatus = "over";
      updateStatusBadge();
      renderTexts();
      draw();
      alert(`${t("gameOverAlert")}${state.score}`);
    }

    // ===============================
    // Canvas 绘制
    // ===============================
    function drawGrid() {
      ctx.save();
      ctx.strokeStyle = "rgba(100,116,139,0.12)";
      ctx.lineWidth = 1;
      for (let i = 1; i < GRID_SIZE; i++) {
        const p = i * CELL_SIZE;
        ctx.beginPath();
        ctx.moveTo(p, 0);
        ctx.lineTo(p, BOARD_PX);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, p);
        ctx.lineTo(BOARD_PX, p);
        ctx.stroke();
      }
      ctx.restore();
    }

    function roundRect(x, y, w, h, r, fillStyle) {
      ctx.save();
      ctx.fillStyle = fillStyle;
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawSnake() {
      state.snake.forEach((seg, idx) => {
        const x = seg.x * CELL_SIZE + 2;
        const y = seg.y * CELL_SIZE + 2;
        const size = CELL_SIZE - 4;
        roundRect(
          x,
          y,
          size,
          size,
          7,
          idx === 0 ? getComputedStyle(document.body).getPropertyValue("--snake-head").trim()
                    : getComputedStyle(document.body).getPropertyValue("--snake").trim()
        );
      });
    }

    function drawFood() {
      const x = state.food.x * CELL_SIZE + CELL_SIZE / 2;
      const y = state.food.y * CELL_SIZE + CELL_SIZE / 2;
      const color = getComputedStyle(document.body).getPropertyValue("--food").trim();

      ctx.save();
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, y, CELL_SIZE * 0.28, 0, Math.PI * 2);
      ctx.fill();

      // 食物高光，增加轻量视觉层次
      ctx.fillStyle = "rgba(255,255,255,0.45)";
      ctx.beginPath();
      ctx.arc(x - 4, y - 4, CELL_SIZE * 0.09, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawOverlayText() {
      if (state.gameStatus === "playing") return;
      const label = getStatusText();
      ctx.save();
      ctx.fillStyle = "rgba(0,0,0,0.18)";
      ctx.fillRect(0, 0, BOARD_PX, BOARD_PX);
      ctx.fillStyle = "#fff";
      ctx.font = "700 36px Inter, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(label, BOARD_PX / 2, BOARD_PX / 2);
      if (state.gameStatus === "paused") {
        ctx.font = "500 16px Inter, sans-serif";
        ctx.fillText(t("pauseTip"), BOARD_PX / 2, BOARD_PX / 2 + 30);
      }
      ctx.restore();
    }

    function draw() {
      ctx.clearRect(0, 0, BOARD_PX, BOARD_PX);
      drawGrid();
      drawFood();
      drawSnake();
      drawOverlayText();
    }

    // ===============================
    // 事件绑定
    // ===============================
    function bindEvents() {
      dom.startBtn.addEventListener("click", startGame);
      dom.pauseBtn.addEventListener("click", togglePause);
      dom.restartBtn.addEventListener("click", restartGame);

      dom.langBtn.addEventListener("click", () => {
        state.language = state.language === "zh" ? "en" : "zh";
        safeSave(STORAGE_KEYS.language, state.language);
        renderTexts();
      });

      dom.themeSelect.addEventListener("change", (e) => {
        state.theme = e.target.value;
        document.body.setAttribute("data-theme", state.theme);
        safeSave(STORAGE_KEYS.theme, state.theme);
        draw();
      });

      dom.difficultySelect.addEventListener("change", (e) => {
        state.difficulty = e.target.value;
        safeSave(STORAGE_KEYS.difficulty, state.difficulty);
        // 正在游戏时动态切速
        if (state.gameStatus === "playing") startLoop();
      });

      window.addEventListener("keydown", (e) => {
        const key = e.key.length === 1 ? e.key.toLowerCase() : e.key;

        if (key === " " || e.code === "Space") {
          e.preventDefault();
          togglePause();
          return;
        }

        setDirectionByKey(key);

        // Ready 状态下按方向键可快速开始
        if (state.gameStatus === "ready" && ["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","w","a","s","d"].includes(key)) {
          startGame();
        }
      });
    }

    // ===============================
    // 启动
    // ===============================
    function init() {
      state.bestScore = safeLoadBestScore();
      document.body.setAttribute("data-theme", state.theme);
      bindEvents();
      resetGameData();
      renderTexts();
      updateScoreView();
      draw();
    }

    init();
  </script>
</body>
</html>
